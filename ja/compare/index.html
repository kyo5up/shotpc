<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIミニPC スペック一括比較表 - ShotPC</title>
    <link rel="stylesheet" href="/shotpc/assets/css/style.css">
    <link rel="icon" href="/shotpc/assets/img/favicon.ico" sizes="any">
    <link rel="icon" href="/shotpc/assets/img/favicon-32x32.png" type="image/png">
    <link rel="apple-touch-icon" href="/shotpc/assets/img/favicon-192x192.png">
    <style>
        /* 軽さを追求した専用スタイル (タイト版) */
        header { 
            padding: 1rem 0 !important; 
            margin-bottom: 1rem !important; 
        }
        header h1 a { font-size: 1.8rem !important; }
        header p { font-size: 0.9rem !important; }

        .container { 
            max-width: 98% !important; 
        }

        .compare-wrapper {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: auto;
            max-height: calc(100vh - 130px);
            display: block;
            background: #fff;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.75rem; /* さらに文字を小さくして密度を上げる */
            white-space: nowrap;
        }
        th, td {
            padding: 6px 10px;
            border-bottom: 1px solid #eee;
            border-right: 1px solid #eee;
        }
        th:first-child, td:first-child {
            border-left: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid #ccc;
        }
        th:hover { background: #e9ecef; }
        th::after { content: ' ↕'; opacity: 0.3; font-size: 0.6rem; }

        /* 左側3列を固定 (shotsim 準拠ロジック + ジッター防止) */
        .sticky-col-1, .sticky-col-2, .sticky-col-3 {
            position: sticky;
            z-index: 5;
            background: #fff;
        }
        .sticky-col-1 {
            left: 0;
            min-width: 35px;
            text-align: center;
            color: #aaa;
        }
        .sticky-col-2 {
            left: var(--col1-width, 35px);
            min-width: 80px;
        }
        .sticky-col-3 {
            left: calc(var(--col1-width, 35px) + var(--col2-width, 80px));
            min-width: 130px;
            border-right: 2px solid #444;
        }

        th.sticky-col-1, th.sticky-col-2, th.sticky-col-3 {
            z-index: 15;
            background: #f8f9fa;
        }

        tr:nth-child(even) td { background: #fafafa; }
        tr:nth-child(even) td.sticky-col-1,
        tr:nth-child(even) td.sticky-col-2,
        tr:nth-child(even) td.sticky-col-3 {
            background: #fafafa;
        }

        tr:hover td { background: #f0f7ff !important; }
        tr:hover td.sticky-col-1,
        tr:hover td.sticky-col-2,
        tr:hover td.sticky-col-3 {
            background: #f0f7ff !important;
        }

        .num { text-align: right; font-family: monospace; }
        .ai-status { color: #157347; font-weight: bold; }
        .btn-link { text-decoration: none; color: #0d6efd; font-weight: bold; }
        .btn-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/shotpc/">ShotPC</a></h1>
            <p>AIミニPC スペック一括比較表 (PCPartPicker Style)</p>
        </div>
    </header>

    <main class="container">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1rem;">
            <div>
                <h2 style="font-size:1.2rem; margin:0;">全機種リスト</h2>
                <p style="font-size:0.8rem; color:#666; margin:0;">項目名クリックでソート。横スクロールで詳細を確認。</p>
            </div>
            <a href="/shotpc/" class="btn-link" style="font-size:0.85rem;">← 検索画面へ</a>
        </div>

        <div class="compare-wrapper">
            <table id="spec-table">
                <thead>
                    <tr>
                        <th class="sticky-col-1">#</th>
                        <th class="sticky-col-2" data-sort="brand">Brand</th>
                        <th class="sticky-col-3" data-sort="model">Model</th>
                        <th data-sort="cpu.name">CPU</th>
                        <th class="num admin-only" data-sort="cpu.benchmark_score">Score</th>
                        <th class="num admin-only" data-sort="ai_features.npu_tops">NPU</th>
                        <th class="num" data-sort="ram.capacity_gb">RAM</th>
                        <th data-sort="ai_features.vram_allocation">VRAM</th>
                        <th data-sort="ai_features.oculink_support">Oculink</th>
                        <th class="num admin-only" data-sort="io_ports.usb4_count">USB4</th>
                        <th class="admin-only" data-sort="io_ports.lan_speed">LAN</th>
                        <th data-sort="ai_features.ai_inference_suitability">AI Class</th>
                        <th class="num" data-sort="effective_price_jpy">Price</th>
                        <th class="admin-only" data-sort="physical.dimensions">Size (W×D×H)</th>
                        <th>Amazon</th>
                    </tr>
                </thead>
                <tbody id="spec-body">
                    <!-- JSで描画 -->
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ShotPC. 掲載情報はAmazon等の各ECサイトのものです。</p>
            <p class="disclaimer">※Amazonアソシエイトとして、ShotPCは適格販売により収入を得ています。</p>
        </div>
    </footer>

    <script src="/shotpc/assets/js/app.js"></script>
    <script>
        let miniData = [];
        let sortDir = 1;
        let lastKey = '';
        const isAdmin = localStorage.getItem('shotpc_admin') === 'true';

        const getVal = (obj, path) => path.split('.').reduce((o, i) => (o ? o[i] : null), obj);

        async function init() {
            try {
                const res = await fetch('/shotpc/data/minis.json');
                miniData = await res.json();
                renderTable(miniData);

                document.querySelectorAll('th[data-sort]').forEach(th => {
                    th.addEventListener('click', () => {
                        const key = th.dataset.sort;
                        sortDir = (lastKey === key) ? -sortDir : 1;
                        lastKey = key;
                        
                        const sorted = [...miniData].sort((a, b) => {
                            const valA = getVal(a, key);
                            const valB = getVal(b, key);
                            if (typeof valA === 'number') return (valA - valB) * sortDir;
                            return String(valA).localeCompare(String(valB)) * sortDir;
                        });
                        renderTable(sorted);
                    });
                });
            } catch (e) { console.error(e); }
        }

        function renderTable(data) {
            const body = document.getElementById('spec-body');
            
            // Adminモード時のみ表示する列の制御
            const adminHeaders = document.querySelectorAll('.admin-only');
            adminHeaders.forEach(el => el.style.display = isAdmin ? 'table-cell' : 'none');

            body.innerHTML = data.map((pc, idx) => `
                <tr>
                    <td class="sticky-col-1">${idx + 1}</td>
                    <td class="sticky-col-2">${pc.brand}</td>
                    <td class="sticky-col-3"><strong>${pc.model}</strong></td>
                    <td>${pc.cpu.name}</td>
                    ${isAdmin ? `<td class="num">${pc.cpu.benchmark_score || '-'}</td>` : ''}
                    ${isAdmin ? `<td class="num">${pc.ai_features.npu_tops || '-'}</td>` : ''}
                    <td class="num">${pc.ram.capacity_gb}GB</td>
                    <td class="ai-status">${pc.ai_features.vram_allocation || '-'}</td>
                    <td>${pc.ai_features.oculink_support ? 'Yes' : '-'}</td>
                    ${isAdmin ? `<td class="num">${pc.io_ports?.usb4_count || '0'}</td>` : ''}
                    ${isAdmin ? `<td>${pc.io_ports?.lan_speed || '-'}</td>` : ''}
                    <td>${pc.ai_features.ai_inference_suitability}</td>
                    <td class="num">¥${pc.effective_price_jpy.toLocaleString()}</td>
                    ${isAdmin ? `<td>${pc.physical?.dimensions || '-'}</td>` : ''}
                    <td><a href="${pc.amazon_url}" target="_blank" class="btn-link">View</a></td>
                </tr>
            `).join('');

            requestAnimationFrame(() => {
                const table = document.getElementById('spec-table');
                const col1 = document.querySelector('th.sticky-col-1');
                const col2 = document.querySelector('th.sticky-col-2');
                if (!table || !col1 || !col2) return;

                const w1 = col1.getBoundingClientRect().width;
                const w2 = col2.getBoundingClientRect().width;

                table.style.setProperty('--col1-width', w1 + 'px');
                table.style.setProperty('--col2-width', w2 + 'px');
            });
        }

        init();
    </script>
</body>
</html>
