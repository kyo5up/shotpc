<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIミニPC カタログ一覧 - ShotPC</title>
    <link rel="stylesheet" href="/shotpc/assets/css/style.css">
    <link rel="icon" href="/shotpc/assets/img/favicon.ico" sizes="any">
    <link rel="icon" href="/shotpc/assets/img/favicon-32x32.png" type="image/png">
    <link rel="apple-touch-icon" href="/shotpc/assets/img/favicon-192x192.png">
    <style>
        header {
            padding: 1rem 0 !important;
            margin-bottom: 1rem !important;
        }

        header h1 a {
            font-size: 1.8rem !important;
        }

        header p {
            font-size: 0.9rem !important;
        }

        .catalog-shell {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1rem;
            align-items: start;
        }

        .catalog-sidebar {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            position: sticky;
            top: 16px;
        }

        .catalog-filter-group {
            margin-bottom: 1rem;
        }

        .catalog-filter-group h3 {
            font-size: 0.9rem;
            margin-bottom: 0.55rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border-color);
        }

        .catalog-filter-list {
            display: grid;
            gap: 0.35rem;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 0.2rem;
        }

        .catalog-filter-list label {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .catalog-filter-list span {
            color: var(--text-sub);
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .catalog-main {
            min-width: 0;
        }

        .catalog-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .catalog-toolbar h2 {
            font-size: 1.1rem;
            margin: 0;
        }

        .catalog-toolbar p {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin: 0.15rem 0 0;
        }

        .catalog-sort {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }

        .catalog-sort select {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #fff;
            padding: 0.45rem 0.6rem;
            font-size: 0.82rem;
        }

        .catalog-table-wrap {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: auto;
            max-height: calc(100vh - 145px);
        }

        .catalog-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .catalog-table th,
        .catalog-table td {
            padding: 0.55rem 0.7rem;
            border-bottom: 1px solid #edf2f7;
            border-right: 1px solid #edf2f7;
            text-align: left;
            background: #fff;
        }

        .catalog-table th {
            position: sticky;
            top: 0;
            z-index: 5;
            background: #f8fafc;
            font-weight: 700;
        }

        .catalog-table .sticky-a,
        .catalog-table .sticky-b,
        .catalog-table .sticky-c {
            position: sticky;
            z-index: 6;
            background: inherit;
        }

        .catalog-table .sticky-a {
            left: 0;
            min-width: 52px;
        }

        .catalog-table .sticky-b {
            left: 52px;
            min-width: 100px;
        }

        .catalog-table .sticky-c {
            left: 152px;
            min-width: 140px;
            border-right: 2px solid #cbd5e1;
        }

        .catalog-table tbody tr:nth-child(even) td {
            background: #fbfdff;
        }

        .catalog-table tbody tr:hover td {
            background: #eef6ff;
        }

        .catalog-num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .catalog-badge {
            display: inline-block;
            padding: 0.14rem 0.38rem;
            border-radius: 999px;
            font-size: 0.69rem;
            font-weight: 700;
            background: #eff6ff;
            color: #1d4ed8;
        }

        .catalog-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
        }

        .catalog-link:hover {
            text-decoration: underline;
        }

        .catalog-empty {
            padding: 1.25rem;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        @media (max-width: 980px) {
            .catalog-shell {
                grid-template-columns: 1fr;
            }

            .catalog-sidebar {
                position: static;
            }

            .catalog-table-wrap {
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/shotpc/">ShotPC</a></h1>
            <p>AIミニPC カタログ一覧 (Light Catalog Preview)</p>
        </div>
    </header>

    <main class="container catalog-shell">
        <aside class="catalog-sidebar" id="catalog-sidebar">
            <section class="catalog-filter-group">
                <h3>Brand</h3>
                <div class="catalog-filter-list" id="catalog-brand-filters">
                    <div class="loading">読み込み中...</div>
                </div>
            </section>
            <section class="catalog-filter-group">
                <h3>CPU</h3>
                <div class="catalog-filter-list" id="catalog-cpu-filters">
                    <div class="loading">読み込み中...</div>
                </div>
            </section>
            <section class="catalog-filter-group">
                <h3>RAM</h3>
                <div class="catalog-filter-list" id="catalog-ram-filters">
                    <div class="loading">読み込み中...</div>
                </div>
            </section>
            <section class="catalog-filter-group">
                <h3>Options</h3>
                <div class="catalog-filter-list">
                    <label><span><input type="checkbox" name="stock_only"> 在庫ありのみ</span></label>
                    <label><span><input type="checkbox" name="oculink_only"> Oculink対応</span></label>
                    <label><span><input type="checkbox" name="usb4_only"> USB4あり</span></label>
                </div>
            </section>
        </aside>

        <section class="catalog-main">
            <div class="catalog-toolbar">
                <div>
                    <h2>高密度一覧</h2>
                    <p>左で絞り込み、右で軽く一覧比較する試作ページです。</p>
                </div>
                <div class="catalog-sort">
                    <label for="catalog-sort">Sort</label>
                    <select id="catalog-sort">
                        <option value="price_asc">価格が安い順</option>
                        <option value="price_desc">価格が高い順</option>
                        <option value="ram_desc">RAMが大きい順</option>
                        <option value="brand_asc">Brand順</option>
                    </select>
                </div>
            </div>

            <div class="catalog-table-wrap">
                <table class="catalog-table">
                    <thead>
                        <tr>
                            <th class="sticky-a">#</th>
                            <th class="sticky-b">Brand</th>
                            <th class="sticky-c">Model</th>
                            <th>CPU</th>
                            <th>RAM</th>
                            <th>Storage</th>
                            <th>AI</th>
                            <th>Ports</th>
                            <th class="catalog-num">Price</th>
                            <th>Amazon</th>
                        </tr>
                    </thead>
                    <tbody id="catalog-body">
                        <tr><td colspan="10" class="catalog-empty">読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ShotPC. 掲載情報はAmazon等の各ECサイトのものです。</p>
            <p class="disclaimer">※Amazonアソシエイトとして、ShotPCは適格販売により収入を得ています。</p>
        </div>
    </footer>

    <script src="/shotpc/assets/js/app.js"></script>
    <script>
        const brandFilters = document.getElementById('catalog-brand-filters');
        const cpuFilters = document.getElementById('catalog-cpu-filters');
        const ramFilters = document.getElementById('catalog-ram-filters');
        const catalogBody = document.getElementById('catalog-body');
        const catalogSidebar = document.getElementById('catalog-sidebar');
        const catalogSort = document.getElementById('catalog-sort');

        let allCatalogMinis = [];

        function displayBrand(brand) {
            return brand === 'Unknown' ? 'その他' : brand;
        }

        function buildCounts(rows, keyFn) {
            const map = new Map();
            rows.forEach(row => {
                const key = keyFn(row);
                map.set(key, (map.get(key) || 0) + 1);
            });
            return map;
        }

        function renderCatalogFilters() {
            const brandCounts = Array.from(buildCounts(allCatalogMinis, row => row.brand || 'Unknown').entries())
                .sort((a, b) => b[1] - a[1] || displayBrand(a[0]).localeCompare(displayBrand(b[0]), 'ja'));

            brandFilters.innerHTML = brandCounts.map(([brand, count]) => `
                <label><span><input type="checkbox" name="catalog_brand" value="${brand}"> ${displayBrand(brand)}</span><span>${count}</span></label>
            `).join('');

            const cpuDefs = [
                ['ryzen_ai', 'Ryzen AI', name => name.includes('ryzen ai')],
                ['ryzen9', 'Ryzen 9', name => name.includes('ryzen 9')],
                ['ryzen7', 'Ryzen 7', name => name.includes('ryzen 7')],
                ['ryzen5', 'Ryzen 5', name => name.includes('ryzen 5')],
                ['core_ultra', 'Core Ultra', name => name.includes('core ultra')],
                ['core_i7', 'Core i7', name => name.includes('core i7')],
                ['core_i5', 'Core i5', name => name.includes('core i5')],
                ['intel_n', 'Intel N', name => /\bn\d{3}\b/.test(name)],
            ];

            cpuFilters.innerHTML = cpuDefs.map(([value, label, matcher]) => {
                const count = allCatalogMinis.filter(row => matcher((row.cpu?.name || '').toLowerCase())).length;
                if (!count) return '';
                return `<label><span><input type="checkbox" name="catalog_cpu" value="${value}"> ${label}</span><span>${count}</span></label>`;
            }).join('');

            const ramDefs = [8, 16, 24, 32, 64, 128];
            ramFilters.innerHTML = ramDefs.map(min => {
                const count = allCatalogMinis.filter(row => Number(row.ram?.capacity_gb || 0) >= min).length;
                if (!count) return '';
                return `<label><span><input type="checkbox" name="catalog_ram" value="${min}"> ${min}GB以上</span><span>${count}</span></label>`;
            }).join('');
        }

        function sortCatalog(rows) {
            const value = catalogSort.value;
            const sorted = [...rows];
            if (value === 'price_asc') sorted.sort((a, b) => (a.effective_price_jpy || 0) - (b.effective_price_jpy || 0));
            if (value === 'price_desc') sorted.sort((a, b) => (b.effective_price_jpy || 0) - (a.effective_price_jpy || 0));
            if (value === 'ram_desc') sorted.sort((a, b) => (b.ram?.capacity_gb || 0) - (a.ram?.capacity_gb || 0));
            if (value === 'brand_asc') sorted.sort((a, b) => displayBrand(a.brand || '').localeCompare(displayBrand(b.brand || ''), 'ja'));
            return sorted;
        }

        function applyCatalogFilters() {
            const selectedBrands = Array.from(document.querySelectorAll('input[name="catalog_brand"]:checked')).map(el => el.value);
            const selectedCpus = Array.from(document.querySelectorAll('input[name="catalog_cpu"]:checked')).map(el => el.value);
            const selectedRams = Array.from(document.querySelectorAll('input[name="catalog_ram"]:checked')).map(el => Number(el.value));
            const stockOnly = document.querySelector('input[name="stock_only"]')?.checked;
            const oculinkOnly = document.querySelector('input[name="oculink_only"]')?.checked;
            const usb4Only = document.querySelector('input[name="usb4_only"]')?.checked;

            const cpuMatchers = {
                ryzen_ai: name => name.includes('ryzen ai'),
                ryzen9: name => name.includes('ryzen 9'),
                ryzen7: name => name.includes('ryzen 7'),
                ryzen5: name => name.includes('ryzen 5'),
                core_ultra: name => name.includes('core ultra'),
                core_i7: name => name.includes('core i7'),
                core_i5: name => name.includes('core i5'),
                intel_n: name => /\bn\d{3}\b/.test(name),
            };

            const filtered = allCatalogMinis.filter(row => {
                const brandMatch = selectedBrands.length === 0 || selectedBrands.includes(row.brand || 'Unknown');
                const cpuName = (row.cpu?.name || '').toLowerCase();
                const cpuMatch = selectedCpus.length === 0 || selectedCpus.some(key => cpuMatchers[key]?.(cpuName));
                const ramMatch = selectedRams.length === 0 || selectedRams.some(min => Number(row.ram?.capacity_gb || 0) >= min);
                const stockMatch = !stockOnly || row.stock === 'in_stock';
                const oculinkMatch = !oculinkOnly || row.ai_features?.oculink_support === true;
                const usb4Match = !usb4Only || Number(row.io_ports?.usb4_count || 0) > 0;
                return brandMatch && cpuMatch && ramMatch && stockMatch && oculinkMatch && usb4Match;
            });

            renderCatalogTable(sortCatalog(filtered));
        }

        function renderCatalogTable(rows) {
            if (!rows.length) {
                catalogBody.innerHTML = '<tr><td colspan="10" class="catalog-empty">条件に合うミニPCがありません。</td></tr>';
                return;
            }

            catalogBody.innerHTML = rows.map((row, index) => {
                const ports = [
                    row.ai_features?.oculink_support ? 'Oculink' : null,
                    Number(row.io_ports?.usb4_count || 0) > 0 ? `USB4 x${row.io_ports.usb4_count}` : null,
                    row.io_ports?.lan_speed || null,
                ].filter(Boolean).join(' / ') || '-';

                return `
                    <tr>
                        <td class="sticky-a catalog-num">${index + 1}</td>
                        <td class="sticky-b">${displayBrand(row.brand)}</td>
                        <td class="sticky-c"><strong>${row.model}</strong></td>
                        <td>${row.cpu?.name || '-'}</td>
                        <td>${row.ram?.capacity_gb || '-'}GB</td>
                        <td>${row.storage?.capacity_gb || '-'}GB</td>
                        <td><span class="catalog-badge">${row.ai_features?.ai_inference_suitability || '-'}</span></td>
                        <td>${ports}</td>
                        <td class="catalog-num">¥${Number(row.effective_price_jpy || 0).toLocaleString()}</td>
                        <td><a href="${row.amazon_url}" target="_blank" class="catalog-link">View</a></td>
                    </tr>
                `;
            }).join('');
        }

        async function initCatalogPage() {
            try {
                const response = await fetch('/shotpc/data/minis.json');
                allCatalogMinis = await response.json();
                renderCatalogFilters();
                applyCatalogFilters();

                catalogSidebar?.addEventListener('change', event => {
                    if (event.target instanceof HTMLInputElement) {
                        applyCatalogFilters();
                    }
                });

                catalogSort?.addEventListener('change', () => {
                    applyCatalogFilters();
                });
            } catch (error) {
                console.error(error);
                catalogBody.innerHTML = '<tr><td colspan="10" class="catalog-empty">データの読み込みに失敗しました。</td></tr>';
            }
        }

        initCatalogPage();
    </script>
</body>
</html>
