<!DOCTYPE html>

<head>

  <title>Beelink | ShotPC</title>
  <link rel="stylesheet" href="/shotpc/assets/css/style.css">
  <style>
    .brand-header {
      padding: 2rem;
      background: linear-gradient(135deg, var(--primary-color, #0066cc), var(--secondary-color, #00cc99));
      color: white;
    }

    .brand-header h1 {
      margin: 0 0 1rem 0;
      font-size: 2.5rem;
    }

    .brand-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    .brand-info dt {
      font-weight: bold;
      color: rgba(255, 255, 255, 0.9);
    }

    .brand-info dd {
      margin: 0;
    }

    .brand-description {
      padding: 2rem;
      background: #f5f5f5;
      line-height: 1.6;
    }

    .products {
      padding: 2rem;
    }

    .products h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .products-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .products-table th {
      background: var(--primary-color, #0066cc);
      color: white;
      padding: 0.75rem;
      text-align: left;
      font-weight: bold;
    }

    .products-table td {
      padding: 0.75rem;
      border-bottom: 1px solid #ddd;
    }

    .products-table tr:hover {
      background: #f9f9f9;
    }

    .products-table a {
      color: var(--primary-color, #0066cc);
      text-decoration: none;
    }

    .products-table a:hover {
      text-decoration: underline;
    }

    .no-products {
      padding: 3rem 2rem;
      text-align: center;
      color: #666;
      font-size: 1.1rem;
    }
  </style>
</head>
