<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShotPC - ミニPC比較・在庫確認ポータル</title>
    <link rel="stylesheet" href="/shotpc/assets/css/style.css">
    <link rel="icon" href="/shotpc/assets/img/favicon.ico" sizes="any">
    <link rel="icon" href="/shotpc/assets/img/favicon-32x32.png" type="image/png">
    <link rel="apple-touch-icon" href="/shotpc/assets/img/favicon-192x192.png">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/shotpc/">ShotPC</a></h1>
            <p>AI構築のためのミニPC比較・在庫確認ポータル</p>
        </div>
    </header>

    <main class="container">
        <!-- (サイドバーと製品リスト) -->
        <aside id="sidebar">
            <section class="filter-group">
                <h3>Brand</h3>
                <div id="brand-filter-list" class="filter-options">
                    <div class="loading">ブランドを読み込み中...</div>
                </div>
            </section>
            <section class="filter-group">
                <h3>CPU</h3>
                <div id="cpu-filter-list" class="filter-options">
                    <div class="loading">CPUを読み込み中...</div>
                </div>
            </section>
            <section class="filter-group">
                <h3>RAM</h3>
                <div id="ram-filter-list" class="filter-options">
                    <div class="loading">RAMを読み込み中...</div>
                </div>
            </section>
            <section class="filter-group">
                <label><input type="checkbox" name="stock" value="in_stock"> 在庫ありのみ表示</label>
            </section>

            <section class="filter-group">
                <h3>AI / 拡張性</h3>
                <label title="BIOS設定等でVRAMを16GB以上割り当て可能な機種"><input type="checkbox" name="ai" value="vram16"> VRAM 16GB以上可</label>
                <label title="eGPU(外付けGPU)を高速接続できるOculink端子搭載機種"><input type="checkbox" name="ai" value="oculink"> Oculink対応</label>
                <label title="メモリを64GB以上搭載または増設可能な機種"><input type="checkbox" name="ai" value="ram64"> メモリ64GB以上可</label>
            </section>

            <section class="filter-group">
                <h3>ツール</h3>
                <div class="article-item">
                    <a href="/shotpc/ja/compare/" style="font-weight: bold; color: var(--primary-color);">📊 全機種スペック比較表</a>
                </div>
            </section>

            <section class="filter-group" id="ai-guide">
                <h3>AI活用ガイド</h3>
                <div id="article-list">
                    <!-- JavaScript でここに記事一覧を表示 -->
                    <div class="loading">記事を読み込み中...</div>
                </div>
            </section>
        </aside>

        <section id="product-list">
            <!-- JavaScript でここにミニPCの一覧を表示 -->
            <div class="loading">データを読み込み中...</div>
        </section>
    </main>

    <section id="featured-brands" class="container">
        <hr>
        <h2>注目のAI向けメーカー</h2>
        <div class="brand-grid" id="brand-list">
            <!-- JavaScript でここにメーカー一覧を表示 -->
            <div class="loading">メーカー情報を読み込み中...</div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p><span style="color:#f1c40f;">&copy; 2026 ShotPC.</span> 掲載情報はAmazon等の各ECサイトのものです。</p>
            <p class="disclaimer">※Amazonアソシエイトとして,ShotPCは適格販売により収入を得ています。</p>
        </div>
    </footer>

    <!-- 比較用フローティングバー -->
    <div id="compare-bar">
        <div class="compare-info">選択中: <span id="compare-count">0</span> 件</div>
        <button class="btn-compare-start" id="btn-compare-open">選択した機種を比較する</button>
    </div>

    <!-- 比較モーダル -->
    <div class="modal-overlay" id="compare-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>スペック比較</h2>
                <button class="btn-close-modal" id="btn-compare-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="compare-table-wrapper">
                    <table class="compare-modal-table">
                        <tbody id="compare-table-body">
                            <!-- JSで生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/shotpc/assets/js/app.js"></script>
</body>
</html>
